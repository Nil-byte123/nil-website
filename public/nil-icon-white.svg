<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="500" height="500" rx="100" fill="#FFFFFF"/>

  <!-- Outer soft glow -->
  <ellipse cx="250" cy="250" rx="55" ry="140" fill="#0EA5E9" opacity="0.07"/>

  <!-- Glow layer 3 (widest) -->
  <rect x="218" y="90" width="64" height="320" rx="32" fill="#38BDF8" opacity="0.10"/>
  <!-- Glow layer 2 -->
  <rect x="228" y="95" width="44" height="310" rx="22" fill="#0EA5E9" opacity="0.22"/>
  <!-- Glow layer 1 -->
  <rect x="235" y="100" width="30" height="300" rx="15" fill="#0EA5E9" opacity="0.45"/>

  <!-- Main I bar -->
  <rect x="239" y="105" width="22" height="290" rx="11" fill="url(#barGrad)"/>

  <!-- Bright white core -->
  <rect x="244" y="120" width="12" height="260" rx="6" fill="white" opacity="0.9"/>

  <defs>
    <linearGradient id="barGrad" x1="250" y1="105" x2="250" y2="395" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
</svg>
